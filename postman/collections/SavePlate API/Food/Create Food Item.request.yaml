$kind: http-request
name: Create Food Item
method: POST
url: '{{baseUrl}}/food'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "item_name": "Spinach",
      "quantity": 200,
      "unit": "g",
      "expiry_date": "2026-05-30",
      "category": "Vegetables",
      "storage_location": "Fridge",
      "remarks": "Organic"
    }
order: 3000
