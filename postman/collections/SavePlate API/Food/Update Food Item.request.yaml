$kind: http-request
name: Update Food Item
method: PUT
url: '{{baseUrl}}/food/{{foodId}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "item_name": "Spinach",
      "quantity": 150,
      "unit": "g",
      "expiry_date": "2026-05-30",
      "category": "Vegetables",
      "storage_location": "Fridge",
      "remarks": "Organic, partially used"
    }
order: 4000
