$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/auth/login'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "jane@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const data = pm.response.json();
      if (data.token) {
        pm.environment.set('token', data.token);
      }
order: 4000
