$kind: http-request
name: Get Stats
method: GET
url: '{{baseUrl}}/analytics'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
queryParams:
  - key: range
    value: '30'
    disabled: true
events:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '    pm.response.to.have.status(200);'
        - '});'
        - ''
        - 'pm.test("Response has expected properties", function () {'
        - '    var jsonData = pm.response.json();'
        - '    pm.expect(jsonData).to.have.property("range");'
        - '    pm.expect(jsonData).to.have.property("summary");'
        - '    pm.expect(jsonData).to.have.property("by_category");'
        - '    pm.expect(jsonData).to.have.property("status_distribution");'
        - '});'
        - ''
        - 'pm.test("Summary contains correct data types", function () {'
        - '    var jsonData = pm.response.json();'
        - '    pm.expect(jsonData.summary.total_tracked).to.be.a("number");'
        - '    pm.expect(jsonData.summary.total_saved).to.be.a("number");'
        - '    pm.expect(jsonData.summary.total_donated).to.be.a("number");'
        - '    pm.expect(jsonData.summary.total_active).to.be.a("number");'
        - '    pm.expect(jsonData.summary.at_risk).to.be.a("number");'
        - '    pm.expect(jsonData.summary.waste_rate_pct).to.be.a("number");'
        - '    pm.expect(jsonData.summary.co2_saved_kg).to.be.a("number");'
        - '});'
        - ''
        - 'pm.test("by_category is an array", function () {'
        - '    var jsonData = pm.response.json();'
        - '    pm.expect(jsonData.by_category).to.be.an("array");'
        - '    if (jsonData.by_category.length > 0) {'
        - '        pm.expect(jsonData.by_category[0]).to.have.property("category");'
        - '        pm.expect(jsonData.by_category[0]).to.have.property("saved");'
        - '        pm.expect(jsonData.by_category[0]).to.have.property("donated");'
        - '    }'
        - '});'
        - ''
        - 'pm.test("status_distribution is an array", function () {'
        - '    var jsonData = pm.response.json();'
        - '    pm.expect(jsonData.status_distribution).to.be.an("array");'
        - '    if (jsonData.status_distribution.length > 0) {'
        - '        pm.expect(jsonData.status_distribution[0]).to.have.property("name");'
        - '        pm.expect(jsonData.status_distribution[0]).to.have.property("value");'
        - '    }'
        - '});'
order: 1000
