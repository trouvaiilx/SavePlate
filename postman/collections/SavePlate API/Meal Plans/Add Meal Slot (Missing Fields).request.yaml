$kind: http-request
name: Add Meal Slot (Missing Fields)
method: POST
url: '{{baseUrl}}/meals/slots'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "week_start": "2026-05-18",
      "day_index": 0
    }
events:
  - listen: test
    script:
      type: text/javascript
      exec:
        - '// TC-6.1.5: Missing required fields (API)'
        - 'pm.test("Status code is 400", function () {'
        - '    pm.response.to.have.status(400);'
        - '});'
        - ''
        - 'pm.test("Error message is correct", function () {'
        - '    var jsonData = pm.response.json();'
        - '    pm.expect(jsonData.error).to.eql("week_start, day_index, meal_type, and meal_name are required.");'
        - '});'
order: 3001
